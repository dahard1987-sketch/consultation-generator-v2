<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>상담기록 메이커 v. 0.78</title>
  <link rel="icon" href="./favicon.svg?v=3" type="image/svg+xml" />
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --panel-soft: #f9fafc;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --line-strong: #d1d5db;
      --brand: #c21872;
      --brand-dark: #9f115c;
      --brand-soft: #fdf2f8;
      --danger: #dc2626;
      --warning: #d97706;
      --ok: #059669;
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.06);
      --shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 12px 36px rgba(15, 23, 42, 0.10);
      --radius: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans KR", sans-serif;
      line-height: 1.5;
      overflow-y: auto;
    }
    button, input, select, textarea { font: inherit; }
    textarea { resize: vertical; min-height: 80px; }
    button {
      border: 0;
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      background: #fdf2f8;
      color: #831843;
      cursor: pointer;
      font-weight: 700;
      transition: 0.15s ease;
      white-space: nowrap;
    }
    button:hover { background: #fce7f3; }
    button.primary { background: var(--brand); color: #fff; }
    button.primary:hover { background: var(--brand-dark); }
    button.danger { background: #fee2e2; color: #991b1b; }
    button.danger:hover { background: #fecaca; }
    button.ghost { background: transparent; color: #374151; border: 1px solid var(--line); }
    button.ghost:hover { background: var(--brand-soft); color: var(--brand-dark); }
    button.small { padding: 6px 10px; border-radius: 8px; font-size: 13px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(194, 24, 114, 0.15);
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      color: #374151;
      font-size: 13px;
    }

    /* ====== APP SHELL ====== */
    .app {
      max-width: 1520px;
      margin: 0 auto;
      padding: 14px 18px 24px;
    }

    /* ====== TOP BAR ====== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      position: relative !important;
      top: auto !important;
      z-index: 1;
      flex-wrap: wrap;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topbar-brand h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
      color: #111827;
    }
    .topbar-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: #f3f4f6;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #374151;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.warn { color: #92400e; background: #fffbeb; border-color: #fde68a; }
    .badge.ok { color: #065f46; background: #ecfdf5; border-color: #a7f3d0; }
    .badge.danger { color: #991b1b; background: #fef2f2; border-color: #fecaca; }

    .topbar-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .auth-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px 5px 10px;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      flex-wrap: wrap;
    }
    .auth-bar input {
      width: 150px;
      padding: 6px 9px;
      font-size: 13px;
      border-radius: 7px;
      background: #fff;
    }
    .auth-bar .auth-info {
      font-size: 13px;
      color: #374151;
      font-weight: 600;
      padding: 0 6px;
    }
    .auth-bar .auth-info.ok { color: var(--ok); }
    .auth-bar .auth-info.warn { color: var(--warning); }
    .auth-bar button { padding: 6px 11px; font-size: 13px; border-radius: 7px; }

    .topbar-divider {
      width: 1px;
      height: 28px;
      background: var(--line);
    }
    .topbar-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .topbar-actions button {
      padding: 8px 12px;
      font-size: 13px;
    }

    /* Dropdown menu */
    .more-wrap { position: relative; }
    .more-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      min-width: 200px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      padding: 6px;
      display: none;
      z-index: 30;
    }
    .more-menu.show { display: block; }
    .more-menu button {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      color: #1f2937;
      padding: 9px 11px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 7px;
    }
    .more-menu button:hover { background: var(--brand-soft); color: var(--brand-dark); }
    .more-menu .menu-divider { height: 1px; background: var(--line); margin: 4px 2px; }

    /* ====== MAIN GRID ====== */
    .grid {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 250px;
      gap: 14px;
      align-items: start;
      min-height: 0;
    }

    /* ====== SIDEBAR ====== */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      top: 76px;
      height: calc(100dvh - 90px);
      max-height: calc(100dvh - 90px);
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior-y: auto;
      padding-right: 2px;
      scrollbar-gutter: stable;
    }
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

    .status-mini {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      box-shadow: var(--shadow-sm);
      font-size: 12.5px;
      display: grid;
      gap: 4px;
    }
    .status-mini .status-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .status-mini .status-row strong { color: #111827; font-weight: 700; }
    .status-mini .status-meta { color: var(--muted); font-size: 11.5px; margin-top: 2px; }

    .side-section {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      flex: 0 0 auto;
    }
    .side-section > summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
      font-weight: 700;
      font-size: 14px;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    .side-section > summary::-webkit-details-marker { display: none; }
    .side-section > summary::after {
      content: "▾";
      color: var(--muted);
      transition: transform 0.2s;
      font-size: 12px;
    }
    .side-section[open] > summary::after { transform: rotate(180deg); }
    .side-section > summary:hover { background: #f9fafb; }
    .side-section[open] > summary { border-bottom: 1px solid var(--line); }
    .side-body { padding: 12px 14px 14px; }

    /* ====== FORMS ====== */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .form-grid.one { grid-template-columns: 1fr; }
    .full { grid-column: 1 / -1; }
    .help { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .mono { font-family: "Noto Sans KR", sans-serif; }
    .project-id {
      background: #f3f4f6;
      color: #374151;
      border-radius: 8px;
      padding: 7px 9px;
      word-break: break-all;
      font-size: 11.5px;
      border: 1px solid #e5e7eb;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 7px; }

    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .check-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
    }
    .check-item:hover { background: #f9fafb; }
    .check-item input { width: auto; margin: 0; }

    .sub-head {
      font-size: 12px;
      color: var(--brand);
      font-weight: 700;
      margin: 10px 0 4px;
      letter-spacing: 0.03em;
    }
    .sub-head:first-child { margin-top: 0; }

    /* ====== MAIN PANEL ====== */
    .main-panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
      container-type: inline-size;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
      position: static;
      z-index: 5;
    }
    .tab {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: #4b5563;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: 0.15s ease;
    }
    .tab:hover { border-color: var(--brand); color: var(--brand); }
    .tab.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .panel-body { padding: 16px; }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(170px, 1.2fr) minmax(130px, 0.7fr) minmax(140px, 0.8fr);
      gap: 10px;
      align-items: end;
      margin-bottom: 12px;
    }
    .toolbar > div { min-width: 0; }
    .toolbar-help { grid-column: 1 / -1; }

    .student-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px 14px;
      background: #fff;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
    }
    .student-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 11px;
    }
    .student-name { font-size: 16px; font-weight: 800; letter-spacing: -0.01em; }
    .student-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .dirty-dot {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #92400e;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11.5px;
      font-weight: 700;
    }
    .saved-dot {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #065f46;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11.5px;
      font-weight: 700;
    }
    .input-row {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 10px;
      align-items: start;
      margin-bottom: 9px;
    }
    .input-row label { margin: 9px 0 0; font-size: 13px; }
    .score-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .score-grid label { font-size: 12px; margin-bottom: 4px; }

    /* ====== SPLIT (students / preview) ====== */
    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 400px);
      gap: 16px;
      min-width: 0;
    }
    .split > section { min-width: 0; }
    body.score-mode .split { grid-template-columns: 1fr; }
    body.score-mode .preview-wrap { display: none; }
    .preview-wrap {
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 150px);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 0 0 10px;
    }
    .preview-header h2 {
      margin: 0;
      font-size: 15px;
      color: #111827;
      letter-spacing: -0.01em;
    }
    .preview-box {
      white-space: pre-wrap;
      min-height: 300px;
      border: 1px solid var(--line);
      background: #fbfdff;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13.5px;
      line-height: 1.65;
      overflow: auto;
      flex: 1;
      color: #1f2937;
      font-family: "Noto Sans KR", sans-serif;
    }
    .score-entry-card {
      display: grid;
      gap: 12px;
      min-width: 0;
      overflow: hidden;
    }
    .bulk-score-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .score-upload-config {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      align-items: end;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #f8fafc;
    }
    .bulk-score-table-wrap {
      overflow: auto;
      max-width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }
    .bulk-score-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 520px;
    }
    .bulk-score-table col.name-col { width: 72px; }
    .bulk-score-table col.class-col { width: 150px; }
    .bulk-score-table col.score-col { width: 72px; }
    .bulk-score-table th,
    .bulk-score-table td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: middle;
    }
    .bulk-score-table th {
      background: #f8fafc;
      font-size: 12px;
      white-space: nowrap;
    }
    .bulk-score-table th:first-child,
    .bulk-score-table td:first-child {
      white-space: nowrap;
      word-break: keep-all;
    }
    .bulk-score-table input,
    .bulk-score-table select {
      width: 100%;
      min-width: 0;
      padding: 8px 9px;
    }
    .progress-sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      top: 76px;
      height: calc(100dvh - 90px);
      max-height: calc(100dvh - 90px);
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    .progress-list {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 170px);
      overflow: auto;
      padding-right: 2px;
    }
    .progress-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      font-size: 12.5px;
    }
    .progress-item input[type="checkbox"] {
      width: auto;
      margin: 0;
    }
    .progress-name {
      min-width: 0;
      word-break: break-word;
    }
    .student-link {
      color: #111827;
      font-weight: 800;
      text-decoration: none;
    }
    .student-link:hover {
      color: var(--brand);
      text-decoration: underline;
    }
    .progress-group {
      margin-top: 10px;
      padding: 7px 2px 2px;
      color: #111827;
      font-size: 12.5px;
      font-weight: 800;
    }
    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.15);
    }
    .progress-dot.in-progress {
      background: #f59e0b;
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.15);
    }
    .progress-dot.complete {
      background: #10b981;
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.15);
    }

    .mini-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .mini-table th, .mini-table td {
      border-bottom: 1px solid var(--line);
      padding: 7px 8px;
      text-align: left;
      vertical-align: top;
    }
    .mini-table th { background: #f8fafc; color: #374151; font-weight: 700; }

    .local-list {
      max-height: 360px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
    }
    .local-item {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .local-item:last-child { border-bottom: 0; }
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 36px 12px;
      border: 1px dashed #cbd5e1;
      border-radius: var(--radius);
      background: #f8fafc;
    }
    .notice {
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fed7aa;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 13px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      width: min(880px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
      border: 1px solid var(--line);
    }
    .modal header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      background: #fff;
    }
    .modal header h3 { margin: 0; font-size: 17px; }
    .modal main { padding: 18px; }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      background: #111827;
      color: #fff;
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
      z-index: 60;
      max-width: 420px;
      font-size: 14px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 1200px) {
      .grid { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; max-height: none; overflow: visible; }
      .progress-sidebar { position: static; height: auto; max-height: none; overflow: visible; }
      .tabs { top: 0; }
    }
    @media (max-width: 800px) {
      .app { padding: 8px 10px 18px; }
      .topbar { position: static; padding: 10px; }
      .topbar-tools { width: 100%; }
      .auth-bar { width: 100%; }
      .auth-bar input { flex: 1; min-width: 110px; width: auto; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .checkbox-grid { grid-template-columns: 1fr; }
      .score-grid { grid-template-columns: repeat(2, 1fr); }
      .score-upload-config { grid-template-columns: 1fr 1fr; }
      .bulk-score-actions { flex-direction: column; align-items: stretch; }
      .input-row { grid-template-columns: 1fr; }
      .student-head { align-items: flex-start; flex-direction: column; }
    }
    @media (max-width: 560px) {
      .toolbar { grid-template-columns: 1fr; }
      .score-upload-config { grid-template-columns: 1fr; }
    }

    @media print {
      body { background: #fff; }
      .no-print, .sidebar, .progress-sidebar, .tabs, .toolbar, .student-card, .topbar { display: none !important; }
      .grid, .split { display: block; }
      .main-panel { box-shadow: none; border: 0; }
      .preview-box { max-height: none; border: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- ============================= TOP BAR ============================= -->
        <header class="topbar no-print">
      <div class="topbar-brand">
        <h1>상담기록 생성기</h1>
        <div class="topbar-badges">
          <span class="badge" id="studentCountBadge">학생 0명</span>
          <span class="badge warn" id="unsavedBadge">서버 저장 필요</span>
          <span class="badge" id="firebaseBadge">서버 확인 중</span>
        </div>
      </div>
      <div class="topbar-tools">
        <div class="auth-bar">
          <button id="loginBtn" type="button" class="primary">구글 로그인</button>
          <span id="authInfoTop" class="auth-info" hidden></span>
          <button id="logoutBtn" class="ghost" type="button" hidden>로그아웃</button>
        </div>
        <div class="topbar-divider"></div>
        <div class="topbar-actions">
          <button id="saveServerBtn" class="primary" type="button" title="Ctrl+S로 서버 저장">서버 저장</button>
          <button id="loadServerBtn" type="button">서버 불러오기</button>
          <div class="more-wrap">
            <button id="moreBtn" class="ghost" type="button" aria-haspopup="menu" aria-expanded="false">더보기</button>
            <div id="moreMenu" class="more-menu" role="menu">
              <button id="exportTxtVerticalBtn" type="button">TXT 내보내기: 세로형</button>
              <button id="exportTxtTsvBtn" type="button">TXT 내보내기: 한 줄형</button>
              <button id="showLocalProjectsBtn" type="button">로컬 프로젝트 목록</button>
              <div class="menu-divider"></div>
              <button id="clearProjectDataBtn" type="button">현재 프로젝트 내용 비우기</button>
              <button id="newProjectBtn" type="button">새 프로젝트</button>
            </div>
          </div>
        </div>
      </div>
    </header>
    <input id="scoreFileInput" type="file" accept=".xlsx,.xls,.csv,.tsv,.txt" hidden />

    <div class="grid">
      <aside class="sidebar no-print">
        <div class="status-mini">
          <div class="status-row"><strong>로컬</strong><span id="localSaveStatus">-</span></div>
          <div class="status-row"><strong>서버</strong><span id="serverSaveStatus">-</span></div>
          <div class="status-meta">
            <span id="dirtyCount">변경된 학생 0명</span> · 마지막 저장 <span id="lastSavedAtView">-</span>
          </div>
        </div>

        <details class="side-section" open>
          <summary>프로젝트 설정</summary>
          <div class="side-body">
            <div class="form-grid">
              <div class="full">
                <label for="teacherName">담당자</label>
                <input id="teacherName" list="teacherList" placeholder="예: 최영진" autocomplete="off" />
                <datalist id="teacherList">
                  <option value="최영진"></option>
                  <option value="김민재"></option>
                  <option value="박보경"></option>
                </datalist>
              </div>
              <div>
                <label for="year">연도</label>
                <select id="year">
                  <option value="2026">2026</option>
                  <option value="2027">2027</option>
                  <option value="2028">2028</option>
                </select>
              </div>
              <div>
                <label for="semester">현재 학기</label>
                <select id="semester">
                  <option value="SP">SP</option>
                  <option value="SU">SU</option>
                  <option value="FA">FA</option>
                  <option value="WI">WI</option>
                </select>
              </div>
              <div>
                <label for="testType">시험</label>
                <select id="testType">
                  <option value="MT1">MT1</option>
                  <option value="MT2" selected>MT2</option>
                  <option value="TT">TT</option>
                  <option value="Prelim">Prelim</option>
                  <option value="ETC">ETC</option>
                </select>
              </div>
              <div>
                <label for="consultationType">차수</label>
                <select id="consultationType">
                  <option value="1차정기">1차 정기</option>
                  <option value="2차정기">2차 정기</option>
                  <option value="3차정기" selected>3차 정기</option>
                </select>
              </div>
              <div>
                <label for="pageSize">한 페이지 학생 수</label>
                <select id="pageSize">
                  <option value="5">5명</option>
                  <option value="10">10명</option>
                  <option value="15">15명</option>
                  <option value="20" selected>20명</option>
                </select>
              </div>
              <div class="full">
                <label for="projectName">프로젝트명</label>
                <input id="projectName" placeholder="자동 생성 또는 직접 입력" />
              </div>
              <div class="full">
                <label>프로젝트 ID</label>
                <div id="projectIdView" class="project-id mono"></div>
              </div>
            </div>
            <div id="authInfo" class="notice" style="margin-top:10px; font-size:12px;">서버 연결 확인 중...</div>
          </div>
        </details>

        <details class="side-section">
          <summary>포함 항목</summary>
          <div class="side-body">
            <div id="includeFields" class="checkbox-grid"></div>
          </div>
        </details>

        <details class="side-section">
          <summary>일정 안내</summary>
          <div class="side-body">
            <div class="help" style="margin-bottom:10px;">상담문 하단에 넣을 학기 일정을 2D/3D별로 관리합니다. 비워둔 일정은 상담문에 포함되지 않습니다.</div>
            <div class="sub-head">3D 일정</div>
            <div class="form-grid">
              <div>
                <label for="schedule3DNextTestName">다음 시험 이름</label>
                <select id="schedule3DNextTestName">
                  <option value="">선택 안 함</option>
                  <option value="MT1">MT1</option>
                  <option value="MT2">MT2</option>
                  <option value="TT">TT</option>
                  <option value="Prelim">Prelim</option>
                  <option value="ETC">ETC</option>
                </select>
              </div>
              <div><label for="schedule3DNextTestDate">다음 시험 일정</label><input id="schedule3DNextTestDate" placeholder="예: 5/20" /></div>
              <div><label for="schedule3DEopAlexAward">EOP/ALEX</label><input id="schedule3DEopAlexAward" /></div>
              <div><label for="schedule3DMarketDay">Market Day</label><input id="schedule3DMarketDay" /></div>
              <div><label for="schedule3DSummerStart">다음 학기 시작</label><input id="schedule3DSummerStart" /></div>
              <div><label for="schedule3DTermEnd">현재 학기 종료</label><input id="schedule3DTermEnd" /></div>
            </div>
            <div class="sub-head">2D 일정</div>
            <div class="form-grid">
              <div>
                <label for="schedule2DNextTestName">다음 시험 이름</label>
                <select id="schedule2DNextTestName">
                  <option value="">선택 안 함</option>
                  <option value="MT1">MT1</option>
                  <option value="MT2">MT2</option>
                  <option value="TT">TT</option>
                  <option value="Prelim">Prelim</option>
                  <option value="ETC">ETC</option>
                </select>
              </div>
              <div><label for="schedule2DNextTestDate">다음 시험 일정</label><input id="schedule2DNextTestDate" placeholder="예: 5/20" /></div>
              <div><label for="schedule2DEopAlexAward">EOP/ALEX</label><input id="schedule2DEopAlexAward" /></div>
              <div><label for="schedule2DMarketDay">Market Day</label><input id="schedule2DMarketDay" /></div>
              <div><label for="schedule2DSummerStart">다음 학기 시작</label><input id="schedule2DSummerStart" /></div>
              <div><label for="schedule2DTermEnd">현재 학기 종료</label><input id="schedule2DTermEnd" /></div>
            </div>
          </div>
        </details>

        <details class="side-section">
          <summary>자유 추가 항목</summary>
          <div class="side-body">
            <div class="form-grid one">
              <div>
                <label for="extraFieldName">항목명</label>
                <input id="extraFieldName" placeholder="예: 진급 가능성" />
              </div>
              <button id="addExtraFieldBtn" type="button">추가 항목 만들기</button>
              <div id="extraFieldsList"></div>
            </div>
          </div>
        </details>
      </aside>

      <main class="main-panel">
        <div class="tabs no-print" id="criterionTabs"></div>
        <div class="panel-body">
          <div class="split">
            <section>
              <div class="toolbar no-print">
                <div>
                  <label for="searchInput">학생 검색</label>
                  <input id="searchInput" placeholder="이름 또는 반" />
                </div>
                <div>
                  <label for="classFilter">반</label>
                  <select id="classFilter"><option value="">전체</option></select>
                </div>
                <div>
                  <label for="completionFilter">상태</label>
                  <select id="completionFilter">
                    <option value="all">전체</option>
                    <option value="dirty">저장 필요</option>
                    <option value="incomplete">미입력</option>
                    <option value="complete">입력 완료</option>
                  </select>
                </div>
                <div class="toolbar-help">
                  <label>작업 안내</label>
                  <div class="notice" style="padding:10px;">학생 목록을 먼저 넣은 뒤, 탭별로 상담 내용을 입력하세요.</div>
                </div>
              </div>

              <div id="bulkTools" class="no-print"></div>
              <div id="studentsContainer"></div>
              <div class="actions no-print" style="justify-content:center; margin-top:14px;">
                <button id="prevPageBtn" type="button">이전 페이지</button>
                <span class="badge" id="pageInfo">1 / 1</span>
                <button id="nextPageBtn" type="button">다음 페이지</button>
              </div>
            </section>

            <aside class="preview-wrap">
              <div class="preview-header">
                <h2>상담문 미리보기</h2>
                <div class="actions no-print">
                  <button class="small primary" id="copyCurrentBtn" type="button">현재 학생 복사</button>
                  <button class="small" id="copyAllBtn" type="button">전체 복사</button>
                </div>
              </div>
              <select id="previewStudentSelect" class="no-print" style="margin-bottom:10px;"></select>
              <div id="previewBox" class="preview-box"></div>
            </aside>
          </div>
        </div>
      </main>

      <aside class="progress-sidebar no-print">
        <details class="side-section" open>
          <summary>진행 현황</summary>
          <div class="side-body">
            <div id="progressSummary" class="help">학생을 입력하세요.</div>
            <div id="progressList" class="progress-list"></div>
          </div>
        </details>
      </aside>
    </div>
  </div>

  <div class="modal-backdrop no-print" id="localProjectsModal">
    <div class="modal">
      <header>
        <h3>로컬 저장 프로젝트 목록</h3>
        <button class="ghost" id="closeLocalProjectsBtn" type="button">닫기</button>
      </header>
      <main>
        <div id="localProjectsList" class="local-list"></div>
      </main>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module" src="./consultation_app.js?v=20260501-13"></script>
</body>
</html>
